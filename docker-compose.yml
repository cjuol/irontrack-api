services:
  web:
    build:
      context: ./web
    ports:
      - "80:80"
    volumes:
      - ./development:/var/www/html/demo
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: training_diary
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d training_diary"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
